papertrail.guild.message-event.retention.days=${MESSAGE_RETENTION_DAYS:30}


# Embed Color Config
papertrail.embed-color.success.color.integer=${EMBED_SUCCESS_COLOR_INT:712458}
papertrail.embed-color.warning.color.integer=${EMBED_WARNING_COLOR_INT:16776960}
papertrail.embed-color.destructive.color.integer=${EMBED_DESTRUCTIVE_COLOR_INT:16711680}