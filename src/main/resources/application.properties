papertrail.embed-color.warning.color.integer=${EMBED_COLOR_WARNING_COLOR_INT:16776960}
papertrail.embed-color.destructive.color.integer=${EMBED_COLOR_DESTRUCTIVE_COLOR_INT:16711680}