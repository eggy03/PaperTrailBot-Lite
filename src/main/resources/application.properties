# Message Log Config
papertrail.guild.message.global.log.channel=${GUILD_MESSAGE_LOG_CHANNEL:-1}
papertrail.guild.message.retention.days=${GUILD_MESSAGE_RETENTION_DAYS:30}

# Embed Color Config
