unknown.action.log.channel=${UNKNOWN_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
voice.channel.status.action.log.channel=${VOICE_CHANNEL_STATUS_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
webhook.action.log.channel=${WEBHOOK_ACTION_LOG_CHANNEL:${global.audit.log.channel}}

guild.boost.event.log.channel=${GUILD_BOOST_EVENT_LOG_CHANNEL:${global.audit.log.channel}}
guild.member.event.log.channel=${GUILD_MEMBER_EVENT_LOG_CHANNEL:${global.audit.log.channel}}
