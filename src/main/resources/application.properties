#  Redis Settings
quarkus.redis.hosts=${REDIS_URL}

#Port
quarkus.http.port=${PORT:8080}
quarkus.management.enabled=true
quarkus.management.port=${MANAGEMENT_PORT:9000}

# Analytics
quarkus.analytics.disabled=true

# Logging Behavior
quarkus.log.category."io.github.eggy03.papertrail.lite".level=${APP_LOG_LEVEL:INFO}

# Native Build Args
quarkus.native.additional-build-args=\
    --trace-object-instantiation=java.security.SecureRandom,\
    --initialize-at-run-time=\
        com.neovisionaries.ws.client.Misc\\,\
        net.dv8tion.jda.internal.audio.CryptoAdapter$AbstractAaedAdapter\\,\
        net.dv8tion.jda.internal.requests.restaction.MessageCreateActionImpl

# Application Token
papertrail.general.app.discord.token=${TOKEN}

# Application Name
papertrail.general.app.name=${APP_NAME:PaperTrail Lite}

# Application Version
papertrail.general.app.version=${quarkus.application.version:N/A}

# Custom Activity
papertrail.general.app.activity=${APP_ACTIVITY:Logging Events}

# Global Log Config
global.event.log.channel=${GLOBAL_EVENT_LOG_CHANNEL:-1}
global.message.event.log.channel=${GLOBAL_MESSAGE_EVENT_LOG_CHANNEL:-1}

## Channel Override Config
### Automod
papertrail.guild.automod-event.log.channel=${AUTOMOD_EVENT_LOG_CHANNEL:${global.event.log.channel}}
### Channel
papertrail.guild.channel-event.log.channel=${CHANNEL_EVENT_LOG_CHANNEL:${global.event.log.channel}}
