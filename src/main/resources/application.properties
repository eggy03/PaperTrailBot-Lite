# Token
discord.token=${TOKEN}

#Port
quarkus.http.port=${PORT:8080}
quarkus.management.enabled=true
quarkus.management.port=${MANAGEMENT_PORT:9000}

# Logging Level
quarkus.log.level=${LOG_LEVEL:INFO}

# Analytics
quarkus.analytics.disabled=true

# Banner
quarkus.banner.path=banner.txt

# Native Build Args
quarkus.native.additional-build-args=\
    --trace-object-instantiation=java.security.SecureRandom,\
    --initialize-at-run-time=\
        com.neovisionaries.ws.client.Misc\\,\
        net.dv8tion.jda.internal.audio.CryptoAdapter$AbstractAaedAdapter\\,\
        net.dv8tion.jda.internal.requests.restaction.MessageCreateActionImpl

# Project Name
project.name=${APP_NAME:PaperTrail Lite}

# Global Channel Config
global.audit.log.channel=${AUDIT_LOG_CHANNEL:"DISABLE"}
global.message.log.channel=${MESSAGE_LOG_CHANNEL:"DISABLE"}

# Channel Override Config
automod.action.log.channel=${AUTOMOD_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
channel.action.log.channel=${CHANNEL_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
channel.override.action.log.channel=${CHANNEL_OVERRIDE_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
emoji.action.log.channel=${EMOJI_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
guild.update.action.log.channel=${GUILD_UPDATE_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
home.settings.action.log.channel=${HOME_SETTINGS_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
integration.action.log.channel=${INTEGRATION_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
invite.action.log.channel=${INVITE_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
member.update.action.log.channel=${MEMBER_UPDATE_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
message.action.log.channel=${MESSAGE_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
message.pin.action.log.channel=${MESSAGE_PIN_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
mod.action.action.log.channel=${MOD_ACTION_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
onboarding.action.log.channel=${ONBOARDING_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
onboarding.prompt.action.log.channel=${ONBOARDING_PROMPT_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
role.action.log.channel=${ROLE_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
scheduled.event.action.log.channel=${SCHEDULED_EVENT_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
soundboard.action.log.channel=${SOUNDBOARD_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
stage.instance.action.log.channel=${STAGE_INSTANCE_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
sticker.action.log.channel=${STICKER_ACTION_LOG_CHANNEL:${global.audit.log.channel}}
